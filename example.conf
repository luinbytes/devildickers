# dd-bhop config
# copy this to dd-bhop.conf and fill in your offsets
# offsets are hex (0x prefix), values are decimal

# pointer chain (you need to find these for your build)
off_globals = 0x0
off_arena = 0x0
off_hero = 0x0

# hero struct layout
h_pos_x = 0x0
h_pos_y = 0x0
h_pos_z = 0x0
h_vel_x = 0x0
h_vel_y = 0x0
h_vel_z = 0x0
h_yaw = 0x0
h_alive = 0x0
h_spd_a = 0x0
h_spd_b = 0x0
h_spd_c = 0x0
h_spd_d = 0x0
h_spd_e = 0x0
h_frict = 0x0
h_timing = 0x0
h_perf = 0x0

# player state enum values
state_gnd = 0
state_air = 0
state_fall = 0

# bhop tuning
timing_val = 0.0

# air control tuning (--strafe mode)
boost_accel = 0.0
boost_spd_c = 0.0
boost_spd_d = 0.0
boost_spd_e = 0.0
boost_frict = 0.0
gravity_cut = 0.0
max_boost_alt = 0.0

# aim mode (--aim)
h_pitch = 0x0
dagger_speed = 0.0
dagger_gravity = 0.0
dagger_up = 0.0
fov = 0

# optional aim assist tuning:
# squid_gem_y_add = 1.5   # raise squid aim point Y (body visually higher than anchor)
# aim_smooth      = 0.30  # hold-LMB smoothing (0.0 frozen .. 1.0 snap instantly)
# aim_flick       = 1.00  # tap-LMB snap (applied for aim_flick_frames)
# aim_flick_frames = 3    # how many frames the flick stays hard
